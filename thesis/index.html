<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inference as Constraint Closure</title>

<style>
html,body{
margin:0;
background:#000;
overflow:hidden;
font-family:monospace;
}

canvas{
position:fixed;
inset:0;
}

/* overlay */
#overlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:4em;
color:#7cff7c;
background:rgba(0,0,0,0.9);
transition:opacity 0.6s;
z-index:10;
cursor:pointer;
}

#overlay.hidden{
opacity:0;
pointer-events:none;
}

/* controls */
#controls{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
background:#001000cc;
border:1px solid #00ff00;
padding:10px 16px;
color:#7cff7c;
display:none;
z-index:6;
}

#controls.visible{
display:block;
}

/* description */
.description{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
max-width:800px;
color:#aaffaa;
background:#001000cc;
border:1px solid #00ff0030;
padding:12px;
font-size:0.85em;
line-height:1.4em;
z-index:5;
transition:opacity 2s ease;
}

.description.fade{
opacity:0;
pointer-events:none;
}

/* essay link */
#essay-link{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#001000cc;
border:1px solid #00ff0030;
padding:10px 14px;
font-size:0.8em;
z-index:6;
}

#essay-link a{
color:#7cff7c;
text-decoration:none;
border-bottom:1px solid #00ff00;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="overlay">▶</div>
<div id="controls">Paused — tap anywhere</div>

<div id="desc" class="description">
Inference as entropy-respecting constraint closure: structure emerges through continuous deformation and constraint stabilization across a dynamic field.
</div>

<div id="essay-link">
<a href="https://standardgalactic.github.io/kitbash/thesis/constraint_closure.pdf" target="_blank">
Inference as Constraint Closure — Full Essay
</a>
</div>

<audio id="audio" src="Perception_as_physical_constraint_closure.mp3"></audio>

<script>

/* ===== fade description ===== */

setTimeout(()=>{
document.getElementById("desc").classList.add("fade")
},12000)

/* ===== audio ===== */

const audio = document.getElementById("audio")
let ctx, analyser, source, buffer

function initAudio(){
if(ctx) return
ctx = new (window.AudioContext||window.webkitAudioContext)()
source = ctx.createMediaElementSource(audio)
analyser = ctx.createAnalyser()
analyser.fftSize = 2048
source.connect(analyser)
analyser.connect(ctx.destination)
buffer = new Uint8Array(analyser.fftSize)

audio.playbackRate = 0.92
audio.preservesPitch = false
if(source.detune) source.detune.value = -300
}

/* ===== interaction ===== */

let started=false, paused=true
const overlay=document.getElementById("overlay")
const controls=document.getElementById("controls")

function toggle(){
if(!started){
initAudio()
ctx.resume().then(()=>audio.play())
overlay.classList.add("hidden")
started=true
paused=false
return
}
if(paused){
audio.play()
controls.classList.remove("visible")
paused=false
}else{
audio.pause()
controls.classList.add("visible")
paused=true
}
}

document.body.addEventListener("click",toggle)

/* ===== canvas ===== */

const canvas=document.getElementById("canvas")
const c=canvas.getContext("2d")

let w,h
function resize(){
w=canvas.width=innerWidth
h=canvas.height=innerHeight
}
resize()
addEventListener("resize",resize)

/* ===== energy ===== */

let hist=[]
const LOOK=20

function energy(buf){
let s=0
for(let i=0;i<buf.length;i++){
let v=(buf[i]-128)/128
s+=v*v
}
return s/buf.length
}

/* ===== shape ===== */

let pts=[], vel=[], rest=[]
let count=6

function initShape(n){
pts=[]; vel=[]; rest=[]
count=n

for(let i=0;i<n;i++){
let x=Math.random()*w
let y=Math.random()*h
pts.push({x,y})
rest.push({x,y})
vel.push({
x:(Math.random()*2-1)*2,
y:(Math.random()*2-1)*2
})
}
}

initShape(count)

/* ===== dynamics ===== */

let scale=1
let hue=0
let t=0

function draw(){

if(analyser){

analyser.getByteTimeDomainData(buffer)

let e=energy(buffer)

/* smoothing */
let s=e
if(hist.length) s=hist[hist.length-1]*0.9 + e*0.1

hist.push(s)
if(hist.length>LOOK) hist.shift()

let peak=Math.max(...hist)

/* predictive scaling */
let target=1+peak*6
scale+=(target-scale)*0.08

/* fade */
c.fillStyle="rgba(0,0,0,0.12)"
c.fillRect(0,0,w,h)

/* center */
let cx=w/2, cy=h/2

c.beginPath()

for(let i=0;i<pts.length;i++){

let r=rest[i]

/* slow drift */
r.x += Math.sin(t*0.2 + i)*0.2
r.y += Math.cos(t*0.15 + i)*0.2

/* deformation field */
let dx = Math.sin(t + i)*20
let dy = Math.cos(t*1.2 + i)*20

/* relax */
pts[i].x += (r.x + dx - pts[i].x)*0.02
pts[i].y += (r.y + dy - pts[i].y)*0.02

/* energy perturbation */
vel[i].x += (Math.random()-0.5)*peak*0.5
vel[i].y += (Math.random()-0.5)*peak*0.5

vel[i].x *= 0.98
vel[i].y *= 0.98

pts[i].x += vel[i].x
pts[i].y += vel[i].y

if(pts[i].x<0||pts[i].x>w) vel[i].x*=-1
if(pts[i].y<0||pts[i].y>h) vel[i].y*=-1

let x=cx+(pts[i].x-cx)*scale
let y=cy+(pts[i].y-cy)*scale

if(i===0) c.moveTo(x,y)
else c.lineTo(x,y)

}

c.closePath()

/* style */
c.strokeStyle=`hsl(${hue},100%,60%)`
c.lineWidth=2+peak*3
c.shadowColor="#00ff88"
c.shadowBlur=15+peak*30
c.stroke()
c.shadowBlur=0

/* slower topology transitions */
if(peak > 0.18 && Math.random() < 0.005){
let n=4+Math.floor(Math.random()*6)
initShape(n)
}

/* color */
hue += 0.3 + peak*2

t += 0.01

}

requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
