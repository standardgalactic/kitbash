<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Obscurantism</title>

<style>

:root{
  --green:#00ff88;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#00ff88;
  font-family:monospace;
  touch-action:manipulation;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:400;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.025) 0px,
      rgba(255,255,255,.025) 1px,
      transparent 2px,
      transparent 4px
    );
  opacity:.16;
}

#bg{
  position:fixed;
  inset:0;
  z-index:1;
}

.title{
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  width:min(96vw,1100px);
  text-align:center;
  font-size:clamp(11px,1.9vw,18px);
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#d7fff0;
  text-shadow:0 0 14px #00ff88;
  z-index:100;
}

.status{
  position:fixed;
  top:58px;
  left:50%;
  transform:translateX(-50%);
  opacity:.5;
  font-size:11px;
  letter-spacing:.16em;
  z-index:120;
}

.portal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

#viz{
  width:min(760px,96vw);
  height:min(760px,96vw);
  border-radius:50%;
  background:
    radial-gradient(circle at center,
      rgba(0,45,18,.95),
      rgba(0,0,0,1));
  border:2px solid rgba(0,255,120,.35);
  box-shadow:
    inset 0 0 120px rgba(0,255,120,.05),
    inset 0 0 40px rgba(0,255,120,.06),
    0 0 40px rgba(0,255,120,.16);
  z-index:40;
}

.subs{
  position:fixed;
  bottom:58px;
  left:0;
  right:0;
  margin:auto;
  width:min(920px,94vw);
  padding:10px 16px;
  min-height:3em;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(13px,3.3vw,17px);
  line-height:1.5;
  color:#e2fff3;
  text-shadow:0 0 12px rgba(0,255,120,.9);
  background:rgba(0,16,0,.34);
  border:1px solid rgba(0,255,120,.18);
  border-radius:8px;
  pointer-events:none;
  z-index:80;
}

.essay{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  color:#9effd0;
  text-decoration:none;
  letter-spacing:.10em;
  font-size:11px;
  opacity:.72;
  z-index:90;
}

.essay:hover{
  opacity:1;
}

.glitch{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:300;
  opacity:0;
}

.glitch.active{
  animation:glitch .16s linear;
}

@keyframes glitch{

  0%{
    opacity:0;
    transform:translate(0,0);
  }

  20%{
    opacity:.28;
    transform:translate(-18px,3px);
  }

  40%{
    opacity:.16;
    transform:translate(14px,-2px);
  }

  70%{
    opacity:.22;
    transform:translate(-6px,4px);
  }

  100%{
    opacity:0;
    transform:translate(0,0);
  }
}

@media(max-width:700px){

  .subs{
    bottom:54px;
  }

  .status{
    font-size:9px;
  }
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="title">
  WHY UNREADABLE WRITING IS ENGINEERED TO FAIL
</div>

<div class="status">
  TOUCH / CLICK ANYWHERE TO PLAY OR PAUSE
</div>

<div class="portal">
  <canvas id="viz"></canvas>
</div>

<div class="subs" id="subs"></div>

<a class="essay"
href="https://standardgalactic.github.io/kitbash/processing/unreadability.pdf"
target="_blank"
onclick="event.stopPropagation()">
THE UNREADABILITY OF DYNAMIC READABILITY
</a>

<div class="glitch" id="glitch"></div>

<audio id="audio" preload="auto">
  <source src="Why_unreadable_writing_is_engineered_to_fail.mp3">
</audio>

<script>

const audio =
  document.getElementById("audio")

const subs =
  document.getElementById("subs")

const glitch =
  document.getElementById("glitch")

let audioCtx
let analyser
let data

function initAudio(){

  if(audioCtx) return

  audioCtx =
    new (
      window.AudioContext ||
      window.webkitAudioContext
    )()

  analyser =
    audioCtx.createAnalyser()

  analyser.fftSize = 2048
  analyser.smoothingTimeConstant = 0.86

  const src =
    audioCtx.createMediaElementSource(audio)

  src.connect(analyser)
  analyser.connect(audioCtx.destination)

  data =
    new Uint8Array(
      analyser.frequencyBinCount
    )
}

document.body.onclick =
  async ()=>{

    initAudio()

    if(audioCtx.state==="suspended")
      await audioCtx.resume()

    if(audio.paused){

      audio.play()

    }else{

      audio.pause()
    }
  }

/* subtitles */

let cues = []

async function loadVTT(){

  try{

    const r =
      await fetch(
        "Why_unreadable_writing_is_engineered_to_fail.vtt"
      )

    if(!r.ok){
      console.warn("Missing VTT")
      return
    }

    const txt =
      await r.text()

    cues =
      parseVTT(txt)

  }catch(e){

    console.warn(e)
  }
}

function parseVTT(txt){

  const lines =
    txt.split("\n")

  const out = []

  let i = 0

  while(i < lines.length){

    const line =
      lines[i].trim()

    if(line.includes("-->")){

      const [s,e] =
        line.split("-->")
            .map(v=>v.trim())

      i++

      const text = []

      while(
        i < lines.length &&
        lines[i].trim()
      ){

        text.push(
          lines[i].trim()
        )

        i++
      }

      out.push({

        start:toSec(s),
        end:toSec(e),
        text:text.join(" ")

      })

    }else{

      i++
    }
  }

  return out
}

function toSec(t){

  const p =
    t.replace(",",".")
     .split(":")

  if(p.length===3){

    return (
      (+p[0])*3600 +
      (+p[1])*60 +
      (+p[2])
    )
  }

  return (
    (+p[0])*60 +
    (+p[1])
  )
}

audio.ontimeupdate = ()=>{

  const t =
    audio.currentTime

  const cue =
    cues.find(c=>
      t >= c.start &&
      t < c.end + .25
    )

  subs.textContent =
    cue ? cue.text : ""
}

loadVTT()

/* background */

const bg =
  document.getElementById("bg")

const bgc =
  bg.getContext("2d")

let SW,SH

function resizeBG(){

  SW =
    bg.width =
      innerWidth

  SH =
    bg.height =
      innerHeight
}

resizeBG()

addEventListener(
  "resize",
  resizeBG
)

const particles = []

for(
  let i=0;
  i<480;
  i++
){

  particles.push({

    x:Math.random()*SW,
    y:Math.random()*SH,

    vx:
      (Math.random()-.5)*0.7,

    vy:
      (Math.random()-.5)*0.7,

    z:
      Math.random()*2
  })
}

function drawBG(){

  bgc.clearRect(
    0,0,SW,SH
  )

  for(const p of particles){

    p.x += p.vx
    p.y += p.vy

    if(p.x < 0) p.x = SW
    if(p.x > SW) p.x = 0

    if(p.y < 0) p.y = SH
    if(p.y > SH) p.y = 0

    bgc.fillStyle =
      `rgba(180,255,220,${
        .012 + p.z*.045
      })`

    bgc.fillRect(
      p.x,
      p.y,
      p.z*1.3,
      p.z*1.3
    )
  }
}

/* glitch */

setInterval(()=>{

  glitch.classList.add(
    "active"
  )

  setTimeout(()=>{

    glitch.classList.remove(
      "active"
    )

  },160)

},12000 + Math.random()*7000)

/* visualizer */

const canvas =
  document.getElementById("viz")

const ctx =
  canvas.getContext("2d")

const size = 920

canvas.width  = size
canvas.height = size

const cx = size/2
const cy = size/2

let bassSmooth = 0
let midSmooth  = 0
let highSmooth = 0

let phase = 0
let frame = 0

function drawUnreadabilityField(){

  if(analyser && data){

    analyser.getByteFrequencyData(data)

    let bass = 0
    let mid  = 0
    let high = 0

    for(let i=0;i<44;i++)
      bass += data[i]

    for(let i=44;i<220;i++)
      mid += data[i]

    for(let i=220;i<700;i++)
      high += data[i]

    bass /= 44 * 255
    mid  /= 176 * 255
    high /= 480 * 255

    bassSmooth +=
      (bass - bassSmooth) * 0.08

    midSmooth +=
      (mid - midSmooth) * 0.06

    highSmooth +=
      (high - highSmooth) * 0.04
  }

  phase +=
    0.018 +
    bassSmooth * 0.04

  ctx.save()

  ctx.beginPath()

  ctx.arc(
    cx,
    cy,
    size*0.47,
    0,
    Math.PI*2
  )

  ctx.clip()

  ctx.fillStyle =
    `rgba(0,5,0,${
      0.08 + bassSmooth*0.07
    })`

  ctx.fillRect(
    0,
    0,
    size,
    size
  )

  /* unreadable textual turbulence */

  for(let layer=0; layer<28; layer++){

    ctx.beginPath()

    const radius =
      size *
      (0.05 + layer*0.014)

    for(
      let a=0;
      a<=Math.PI*2+.03;
      a+=0.028
    ){

      const scramble =
        Math.sin(
          a *
          (14 + layer*0.6) +
          phase *
          (1.5 + layer*0.04)
        ) *
        (3 + highSmooth*26)

      const drift =
        Math.cos(
          a *
          (3 + layer*0.08) -
          phase *
          (0.4 + layer*0.02)
        ) *
        (8 + midSmooth*24)

      const x =
        cx +
        Math.cos(a) *
        (radius + drift + scramble)

      const y =
        cy +
        Math.sin(a) *
        (radius + drift - scramble*.45)

      if(a===0)
        ctx.moveTo(x,y)
      else
        ctx.lineTo(x,y)
    }

    ctx.strokeStyle =
      `rgba(120,255,180,${
        0.004 + layer*0.006
      })`

    ctx.stroke()
  }

  /* collapsing semantic bands */

  for(let i=0;i<180;i++){

    const theta =
      i / 180 * Math.PI*2

    const inner =
      size*0.05

    const outer =
      size*(
        0.34 +
        bassSmooth*0.08
      )

    const corruption =
      Math.sin(
        theta *
        (11 + highSmooth*28) +
        phase*2
      ) *
      highSmooth *
      48

    ctx.beginPath()

    ctx.moveTo(
      cx + Math.cos(theta)*inner,
      cy + Math.sin(theta)*inner
    )

    ctx.lineTo(
      cx + Math.cos(theta)*(outer + corruption),
      cy + Math.sin(theta)*(outer - corruption*.3)
    )

    ctx.strokeStyle =
      `rgba(120,255,180,${
        0.004 + highSmooth*0.04
      })`

    ctx.stroke()
  }

  /* unreadable glyph traces */

  ctx.save()

  ctx.translate(cx,cy)

  ctx.rotate(
    Math.sin(frame*0.0002)*0.5
  )

  const scale =
    size *
    (0.11 + bassSmooth*0.08)

  for(let pass=0; pass<6; pass++){

    ctx.beginPath()

    const alpha =
      pass===0 ? 0.015 :
      pass===1 ? 0.04 :
      pass===2 ? 0.09 :
      pass===3 ? 0.18 :
      pass===4 ? 0.38 :
      0.95

    const spread =
      1 + pass*0.06

    for(let i=0;i<=3400;i++){

      const p =
        i / 3400

      const theta =
        phase +
        p * Math.PI * 10

      const fracture =
        Math.sin(
          theta *
          (28 + highSmooth*44)
        ) *
        highSmooth * 34

      const x =
        Math.sin(
          theta *
          (5 + bassSmooth*2.5)
        ) *
        scale *
        spread +
        fracture

      const y =
        Math.sin(
          theta *
          (7 + midSmooth*3)
        ) *
        scale *
        0.8 *
        spread

      if(i===0)
        ctx.moveTo(x,y)
      else
        ctx.lineTo(x,y)
    }

    ctx.strokeStyle =
      `rgba(120,255,180,${alpha})`

    ctx.lineWidth =
      pass===5
        ? 2 + bassSmooth*4.5
        : .8

    ctx.shadowBlur =
      pass===5
        ? 28 + bassSmooth*42
        : 0

    ctx.shadowColor =
      "#00ff88"

    ctx.stroke()
  }

  ctx.restore()

  ctx.restore()
}

function loop(){

  frame++

  drawBG()

  drawUnreadabilityField()

  if(highSmooth > .48){

    document.body.style.transform =

      `translate(${
        (Math.random()-.5)*6
      }px,${
        (Math.random()-.5)*6
      }px)`
  }
  else{

    document.body.style.transform =
      "translate(0,0)"
  }

  subs.style.transform =
    `scaleY(${1 + bassSmooth*0.05})`

  subs.style.opacity =
    `${0.72 + bassSmooth*0.28}`

  requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
